agents:
  queue: "default-{queue}"

# retry:
#   automatic:
#       limit: 3

label: "{name} ({slug})"
key: "build-{slug}"

commands:
  - echo \"+++ Start Services\"
  - bash scripts/tests/setup/start-services.sh
  - echo \"+++ Run Tests\"
  - bash scripts/cicd/10.test.sh
  - echo \"+++ Stop Services\"
  - bash scripts/tests/setup/stop-services.sh
  - echo \"+++ Run build\"
  - bash scripts/cicd/20.build.sh

plugins:
  - bureau14/qdb-artifacts#download-from-multiple-projects:
      download:
        clean: true
        projects:
          - project_id: "qdb-api-python"
            output-dir: "qdb"
            files:
              - "dist/quasardb-*.whl"
          - project_id: "quasardb-build"
            variant: linux-core2-release
            output-dir: "qdb"
            extract: true
            files:
              - "*-server.tar.zst!*"
              - "*-utils.tar.zst!*"
      upload:
        files:
          - "dist/qdb_cloudwatch-*.whl"
      promote: {}
